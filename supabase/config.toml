# Supabase CLI configuration for the Redshift QTE Demo.
# See https://supabase.com/docs/guides/cli/config for all options.

project_id = "redshift-qte-demo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "https://redshift-qte-demo.urs.deno.net"
additional_redirect_urls = [
  "https://redshift-qte-demo.urs.deno.net",
  "http://127.0.0.1:5173"
]
jwt_expiry = 3600
enable_signup = true

[analytics]
enabled = false

[functions.submitTelemetry]
# Called directly from the browser with the anon key; RLS on `public.telemetry`
# permits anon inserts. JWT verification must be off so the anonymous CORS
# preflight (OPTIONS, no Authorization header) is not rejected by the gateway.
verify_jwt = false

# Match the free-tier remote (vector buckets require a paid plan).
[vector]
enabled = false
