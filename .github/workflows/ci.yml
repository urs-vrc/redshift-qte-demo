name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm run test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1

      - name: Start local Supabase
        run: |
          supabase start
          {
            echo "VITE_SUPABASE_URL=$(supabase status --output json | jq -r .API_URL)"
            echo "VITE_SUPABASE_PUBLISHABLE_KEY=$(supabase status --output json | jq -r .ANON_KEY)"
          } >> "$GITHUB_ENV"

      - name: Integration tests
        run: pnpm run test:integration

      - name: Stop local Supabase
        if: always()
        run: supabase stop
